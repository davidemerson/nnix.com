# remember to add a space after each line of the server_name except before the semicolon!

worker_processes  1;

events {
       worker_connections  1024;
}
http {
       map $http_upgrade $connection_upgrade { 
       default upgrade;
       ''      close;
       }
       server_names_hash_bucket_size  128;
       include       mime.types;
       default_type  application/octet-stream;
       sendfile        on;
       keepalive_timeout  65;
server {
       server_name   www.nnix.com 
                     www.nnix.info 
                     nnix.info 
                     www.nnix.io 
                     nnix.io 
                     www.nnix.link 
                     nnix.link 
                     www.nnix.me 
                     nnix.me 
                     www.nnix.mobi 
                     nnix.mobi 
                     www.nnix.org 
                     nnix.org 
                     www.nnix.farm 
                     nnix.farm
                     ;
       return 301 https://nnix.com$request_uri;
       }
server {
       server_name   www.refmark.com 
                     www.refmark.co 
                     refmark.co 
                     www.refmark.org 
                     refmark.org 
                     www.refmark.net 
                     refmark.net
                     ;
       return 301 https://refmark.com$request_uri;
       }
server {
       server_name   www.davidemerson.com 
                     www.davidemerson.info 
                     davidemerson.info 
                     www.davidemerson.me 
                     davidemerson.me 
                     www.davidemerson.net 
                     davidemerson.net 
                     www.davidemerson.org 
                     davidemerson.org 
                     www.emerson.farm 
                     emerson.farm 
                     www.david.farm 
                     david.farm 
                     www.fernditch.com 
                     fernditch.com
                     ;
       return 301 https://davidemerson.com$request_uri;
       }
server {
       if ($host = nnix.com) 
              {
              return 301 https://$host$request_uri;
              }
       }
server {
       server_name nnix.com;
       listen 443 ssl;
       error_page 404 /404.html;
       ssl_certificate /etc/letsencrypt/live/nnix.com/fullchain.pem;
       ssl_certificate_key /etc/letsencrypt/live/nnix.com/privkey.pem;
       include /etc/letsencrypt/options-ssl-nginx.conf;
       ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
       location /    {
                     root /web/nnix.com;
                     index index.html;
                     proxy_pass http://localhost:8899;
                     proxy_set_header Host $host;
                     proxy_set_header X-Forwarded-Host $host;
                     proxy_set_header X-Forwarded-For $remote_addr:$remote_port;
                     proxy_set_header X-Forwarded-Proto $scheme;
                     proxy_http_version 1.1;
                     proxy_set_header Upgrade $http_upgrade;
                     proxy_set_header Connection $connection_upgrade;
                     }
       }
}